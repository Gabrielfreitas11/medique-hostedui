# =============================================================================
# medique-hostedui — Nginx Reverse Proxy (Production)
# =============================================================================
# Used only in production (docker-compose.prod.yml).
# Development accesses Open WebUI directly on localhost:3000.
#
# Before using:
#   1. Place fullchain.pem and privkey.pem in reverse-proxy/ssl/
#   2. See docs/deployment.md for SSL certificate setup with Certbot.
# =============================================================================

worker_processes auto;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # --- Logging ---
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # --- Performance ---
    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    # --- Rate Limiting ---
    # 10 requests/second per IP, with burst buffer of 20.
    # Protects against abuse without blocking normal student usage.
    limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;

    # --- HTTP → HTTPS Redirect ---
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # --- HTTPS Server ---
    server {
        listen 443 ssl http2;
        server_name _;

        # --- SSL Certificates ---
        # Obtained via Certbot. See docs/deployment.md.
        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;

        # --- SSL Hardening ---
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_session_tickets off;

        # --- Security Headers ---
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        # Note: Content-Security-Policy is intentionally omitted here because
        # Open WebUI's frontend requires inline scripts/styles. Setting a strict
        # CSP would break the UI. To embed via iframe, replace X-Frame-Options
        # with a CSP frame-ancestors directive. See docs/integration.md.

        # --- File Uploads ---
        # Max upload size for PDF files. Adjust if courses have very large PDFs.
        client_max_body_size 100M;

        # --- Proxy to Open WebUI ---
        location / {
            limit_req zone=general burst=20 nodelay;

            proxy_pass http://open-webui:8080;

            # Standard proxy headers
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket support — Open WebUI uses WebSockets for streaming
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";

            # Timeouts — LLM responses can take 30+ seconds for long answers
            proxy_connect_timeout 60s;
            proxy_read_timeout    300s;
            proxy_send_timeout    300s;
        }
    }
}
